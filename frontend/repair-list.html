<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>รายการแจ้งซ่อม | Asset Flow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');

        :root {
            --sidebar-color: #2c3e50;
            --dark-green: #0A3323;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
        }

        .sidebar {
            width: 260px;
            height: 100vh;
            background: var(--sidebar-color);
            position: fixed;
            color: white;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.7);
            padding: 15px 25px;
            text-decoration: none;
            display: block;
        }

        .nav-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-left: 5px solid #839958;
        }

        .main-content {
            margin-left: 260px;
            padding: 30px;
        }

        .card-custom {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="p-4 text-center" style="background: var(--dark-green);">
            <h4>ASSET FLOW</h4>
        </div>
        <nav class="mt-3">
            <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line me-3"></i> หน้ากระดานสรุป</a>
            <a href="my-history.html" class="nav-link"><i class="fas fa-history me-3"></i> ประวัติการยืมของฉัน</a>
            <a href="all-assets.html" class="nav-link"><i class="fas fa-list-check me-3"></i> ทรัพย์สินทั้งหมด</a>
            <a href="repair-list.html" class="nav-link active"><i class="fas fa-tools me-3"></i> รายการแจ้งซ่อม</a>
            <hr class="mx-3 text-white-50">
            <a href="javascript:void(0)" class="nav-link text-warning" onclick="confirmLogout()"><i
                    class="fas fa-sign-out-alt me-3"></i> ออกจากระบบ</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between mb-4">
            <h4><i class="fas fa-tools me-2"></i> รายการแจ้งซ่อม</h4>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#repairModal">+ แจ้งซ่อมใหม่</button>
        </div>
        <div class="card-custom">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>วันที่แจ้ง</th>
                        <th>อุปกรณ์</th>
                        <th>อาการ</th>
                        <th>สถานที่</th>
                        <th>สถานะ</th>
                    </tr>
                </thead>
                <tbody id="repairTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="repairModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 20px;">
                <div class="modal-body p-4">
                    <h5 class="fw-bold mb-4">ระบุรายละเอียดการแจ้งซ่อม</h5>
                    <form id="repairForm">
                        <div class="mb-3">
                            <label class="small fw-bold">เลือกอุปกรณ์</label>
                            <select id="assetSelect" class="form-select" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">อาการเสีย</label>
                            <textarea id="repairDesc" class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">สถานที่</label>
                            <input type="text" id="repairLocation" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2"
                            style="background: var(--dark-green); border:none;">ส่งข้อมูล</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:3000/api';
        const reporter = sessionStorage.getItem('displayName');

        window.onload = function () {
            if (!reporter) window.location.href = 'borrow.html';
            fetchRepairList();
            fetchAssetsForSelect();
        };

        async function fetchRepairList() {
            const res = await fetch(`${API_URL}/repair-list`);
            const data = await res.json();
            document.getElementById('repairTableBody').innerHTML = data.map(item => `
                <tr>
                    <td>${new Date(item.report_date).toLocaleDateString('th-TH')}</td>
                    <td>${item.asset_name}</td>
                    <td>${item.description}</td>
                    <td>${item.location}</td>
                    <td><span class="badge bg-warning text-dark">${item.repair_status.toUpperCase()}</span></td>
                </tr>`).join('');
        }

        async function fetchAssetsForSelect() {
            try {
                const res = await fetch('http://localhost:3000/api/assets');
                const data = await res.json();
                const select = document.getElementById('assetSelect');

                // ✨ กรองเอาเฉพาะอุปกรณ์ที่มีสถานะ active (พร้อมใช้งาน) มาแสดงใน Dropdown
                const available = data.filter(a => a.status.toLowerCase() === 'active');

                select.innerHTML = '<option value="">-- เลือกอุปกรณ์ --</option>' +
                    available.map(a => `<option value="${a.id}">${a.name} [${a.asset_code}]</option>`).join('');
            } catch (err) { console.error(err); }
        }
        document.getElementById('repairForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                asset_id: document.getElementById('assetSelect').value,
                reporter_name: reporter,
                description: document.getElementById('repairDesc').value,
                location: document.getElementById('repairLocation').value
            };
            const res = await fetch(`${API_URL}/repair`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) { alert('สำเร็จ!'); location.reload(); }
        });

        function confirmLogout() { sessionStorage.clear(); window.location.href = 'borrow.html'; }
    </script>
</body>

</html>
