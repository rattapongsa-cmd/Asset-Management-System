<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Asset Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container-fluid p-0">
        <div class="row g-0">
            <nav class="col-md-2 bg-dark vh-100 p-3 text-white sidebar">
                <h4 class="text-center mb-4">ASSET FLOW</h4>
                <ul class="nav nav-pills flex-column">
                    <li class="nav-item"><a href="index.html" class="nav-link text-white active"><i
                                class="bi bi-box me-2"></i> รายการทรัพย์สิน</a></li>
                    <li class="nav-item"><a href="user.html" class="nav-link text-white"><i
                                class="bi bi-person me-2"></i> จัดการผู้ใช้</a></li>
                </ul>
            </nav>

            <main class="col-md-10 p-4">
                <header class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                    <h2>บันทึกทรัพย์สินองค์กร</h2>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal"><i
                            class="bi bi-plus-lg"></i> เพิ่มทรัพย์สิน</button>
                </header>

                <div class="card shadow-sm border-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>รหัสทรัพย์สิน</th>
                                    <th>ชื่อรายการ</th>
                                    <th>หมวดหมู่</th>
                                    <th>สถานะ</th>
                                    <th>สถานที่</th>
                                    <th>จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="assetList">
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog">
            <form id="assetForm" class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5>บันทึกทรัพย์สินใหม่</h5>
                </div>
                <div class="modal-body">
                    <div class="mb-3"><label>ชื่อทรัพย์สิน</label><input type="text" id="name" class="form-control"
                            required></div>
                    <div class="mb-3"><label>หมวดหมู่</label>
                        <select id="category" class="form-select">
                            <option value="IT">IT (คอมพิวเตอร์/อุปกรณ์)</option>
                            <option value="Furniture">Furniture (โต๊ะ/เก้าอี้)</option>
                            <option value="Office">Office (เครื่องใช้สำนักงาน)</option>
                        </select>
                    </div>
                    <div class="mb-3"><label>สถานะเริ่มต้น</label>
                        <select id="status" class="form-select">
                            <option value="active">ใช้งานปกติ</option>
                            <option value="repair">ส่งซ่อม</option>
                        </select>
                    </div>
                    <div class="mb-3"><label>สถานที่ตั้ง</label><input type="text" id="location" class="form-control"
                            placeholder="เช่น ชั้น 2 ห้องไอที"></div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary w-100">ยืนยันการบันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="index.js"></script>
</body>

</html>
