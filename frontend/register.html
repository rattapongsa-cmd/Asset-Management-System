<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetFlow | สมัครสมาชิก</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');

        :root {
            --dark-green: #0A3323;
            --midnight-green: #105666;
            --beige: #F7F4D5;
        }

        body {
            font-family: 'Kanit', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('bg.jpg') center/cover no-repeat;
            position: relative;
        }

        /* Overlay สีเขียวโปร่งแสงตามรูป */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 51, 35, 0.7);
            z-index: 1;
        }

        .register-content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 40px;
            border-radius: 25px;
            /* ขอบมนมากตามรูป */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .logo-image {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        h2 {
            color: var(--dark-green);
            font-weight: 500;
            margin-bottom: 5px;
        }

        p {
            color: var(--midnight-green);
            font-size: 0.85rem;
            margin-bottom: 25px;
        }

        .form-control {
            border-radius: 12px;
            padding: 10px 15px;
            border: 1.5px solid #eee;
            margin-bottom: 12px;
            font-size: 0.9rem;
            background-color: #fdfdfd;
        }

        .btn-register {
            border-radius: 12px;
            padding: 12px;
            font-weight: 500;
            width: 100%;
            background-color: var(--dark-green);
            border: none;
            color: #ffffff;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-register:hover {
            background-color: #061f15;
            transform: translateY(-1px);
        }

        .login-link {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
        }

        .login-link a {
            color: var(--midnight-green);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="register-content">
        <img src="logo.jpg" alt="Logo" class="logo-image">
        <h2>สมัครสมาชิก</h2>
        <p>สร้างบัญชีใหม่สำหรับ Asset Flows</p>

        <form id="registerForm">
            <input type="email" id="email" class="form-control" placeholder="อีเมล" required>

            <div class="row g-2">
                <div class="col-6">
                    <input type="text" id="firstName" class="form-control" placeholder="ชื่อ" required>
                </div>
                <div class="col-6">
                    <input type="text" id="lastName" class="form-control" placeholder="นามสกุล" required>
                </div>
            </div>

            <input type="password" id="password" class="form-control" placeholder="รหัสผ่าน" required>
            <input type="password" id="confirmPassword" class="form-control" placeholder="ยืนยันรหัสผ่าน" required>

            <button type="submit" class="btn btn-register">สมัครสมาชิก</button>
        </form>

        <div class="login-link">
            มีบัญชีอยู่แล้ว? <a href="borrow.html">เข้าสู่ระบบ</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (pass !== confirmPass) {
                alert('รหัสผ่านไม่ตรงกัน!');
                return;
            }

            const data = {
                email: document.getElementById('email').value,
                firstname: document.getElementById('firstName').value,
                lastname: document.getElementById('lastName').value,
                display_name: `${document.getElementById('firstName').value} ${document.getElementById('lastName').value}`,
                password: pass
            };

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    alert('สมัครสมาชิกสำเร็จ!');
                    window.location.href = 'borrow.html';
                } else {
                    alert(result.message || 'เกิดข้อผิดพลาด');
                }
            } catch (error) {
                alert('ไม่สามารถเชื่อมต่อ Server ได้');
            }
        });
    </script>

</body>

</html>
