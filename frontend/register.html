<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก | ASSET FLOW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');
        :root { --dark-green: #0A3323; --moss-green: #5c8052; --bg-light: #f4f7f6; }
        
        body { font-family: 'Kanit', sans-serif; margin: 0; height: 100vh !important; display: flex; overflow: hidden; }
        
        /* ฝั่งซ้าย: รูปภาพพื้นหลัง bg.jpg */
        .login-left {
            width: 50%;
            background: linear-gradient(rgba(10, 51, 35, 0.85), rgba(10, 51, 35, 0.85)), url('bg.jpg') center/cover;
            color: white; display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 40px; text-align: center; height: 100%;
        }

        .login-right {
            width: 50%; background-color: var(--bg-light); 
            display: flex; justify-content: center; align-items: center; padding: 20px; height: 100%;
        }

        .login-card {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); width: 100%; max-width: 480px; text-align: center;
        }

        .form-control {
            border-radius: 12px; padding: 10px 15px; background-color: #fcfcfc;
            border: 1px solid #e0e0e0; font-size: 0.95rem;
        }
        .form-control:focus { border-color: var(--moss-green); box-shadow: 0 0 0 0.2rem rgba(92, 128, 82, 0.2); background-color: #fff; }

        .btn-reg {
            background-color: var(--moss-green); color: white; border-radius: 12px;
            padding: 12px; font-weight: 600; font-size: 1.05rem; transition: 0.3s; border: none;
        }
        .btn-reg:hover { background-color: var(--dark-green); color: white; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="login-left d-none d-md-flex">
        <h1 class="fw-bold mb-2" style="font-size: 3.5rem; letter-spacing: 2px;">ASSET FLOW</h1>
        <h4 class="mb-4" style="font-weight: 400;">สร้างบัญชีใหม่สำหรับ Asset Flows</h4>
        <p style="color: rgba(255,255,255,0.7); font-size: 0.9rem;">ลงทะเบียนเพื่อเข้าถึงระบบจัดการทรัพย์สินที่สะดวกและรวดเร็ว</p>
    </div>

    <div class="login-right w-100 w-md-50">
        <div class="login-card shadow">
            <div style="width: 70px; height: 70px; margin: 0 auto 15px;">
                <img src="logo.jpg" class="w-100 h-100 rounded-circle shadow-sm" style="object-fit: cover; border: 3px solid white;" onerror="this.src='https://via.placeholder.com/70'">
            </div>
            
            <h4 class="fw-bold text-dark mb-4">สมัครสมาชิก</h4>
            
            <form id="registerForm" class="text-start">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">อีเมล (Email)</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="example@email.com" required>
                </div>

                <div class="row mb-3">
                    <div class="col-6">
                        <label class="form-label small fw-bold text-muted">ชื่อ</label>
                        <input type="text" id="regFirstName" class="form-control" placeholder="ชื่อจริง" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-bold text-muted">นามสกุล</label>
                        <input type="text" id="regLastName" class="form-control" placeholder="นามสกุล" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">รหัสผ่าน</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="ตั้งรหัสผ่าน" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">ยืนยันรหัสผ่าน</label>
                    <input type="password" id="regConfirmPassword" class="form-control" placeholder="ยืนยันรหัสผ่านอีกครั้ง" required>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-reg w-100 mb-3">สมัครสมาชิก</button>
                
                <div class="text-center">
                    <a href="borrow.html" class="text-decoration-none small" style="color: var(--dark-green); font-weight: 500;">มีบัญชีอยู่แล้ว? เข้าสู่ระบบ</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('regEmail').value;
            const firstname = document.getElementById('regFirstName').value;
            const lastname = document.getElementById('regLastName').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');

            if (password !== confirmPassword) {
                Swal.fire({ title: 'ข้อผิดพลาด!', text: 'รหัสผ่านไม่ตรงกัน', icon: 'warning', heightAuto: false });
                return;
            }

            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังบันทึก...';
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, firstname, lastname, password })
                });

                if (response.ok) {
                    Swal.fire({
                        title: 'สำเร็จ!', text: 'สมัครสมาชิกเรียบร้อยแล้ว', icon: 'success',
                        timer: 2000, showConfirmButton: false, heightAuto: false 
                    }).then(() => window.location.href = 'borrow.html');
                } else {
                    const errData = await response.json();
                    Swal.fire({ title: 'ผิดพลาด', text: errData.error, icon: 'error', heightAuto: false });
                }
            } catch (error) {
                Swal.fire({ title: 'ติดต่อ Server ไม่ได้', text: 'กรุณาเช็คว่ารัน Backend หรือยัง', icon: 'error', heightAuto: false });
            } finally {
                submitBtn.innerHTML = 'สมัครสมาชิก';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
