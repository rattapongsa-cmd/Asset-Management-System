<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทรัพย์สินทั้งหมด | Asset Flow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
        }

        .sidebar {
            width: 260px;
            height: 100vh;
            background: #2c3e50;
            position: fixed;
            color: white;
            z-index: 100;
        }

        .sidebar-header {
            padding: 25px;
            text-align: center;
            background: #0A3323;
            font-weight: 600;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.7);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: 0.3s;
            border-left: 5px solid transparent;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-left: 5px solid #839958;
        }

        .main-content {
            margin-left: 260px;
            padding: 30px;
        }

        .card-custom {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            background: white;
            padding: 25px;
        }

        .status-badge {
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.85rem;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="sidebar shadow">
        <div class="sidebar-header">
            <h4><i class="fas fa-boxes-stacked me-2"></i>ASSET FLOW</h4>
        </div>
        <div class="nav flex-column mt-3">
            <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line me-3"></i> หน้ากระดานสรุป</a>
            <a href="my-history.html" class="nav-link"><i class="fas fa-history me-3"></i> ประวัติการยืมของฉัน</a>
            <a href="all-assets.html" class="nav-link"><i class="fas fa-list-check me-3"></i> ทรัพย์สินทั้งหมด</a>
            <a href="repair-list.html" class="nav-link"><i class="fas fa-tools me-3"></i> รายการแจ้งซ่อม</a>
            <hr class="mx-3 text-white-50">
            <a href="javascript:void(0)" class="nav-link text-warning" onclick="confirmLogout()">
                <i class="fas fa-sign-out-alt me-3"></i> ออกจากระบบ
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4><i class="fas fa-list-check me-2"></i> ทรัพย์สินทั้งหมดในระบบ</h4>
            <div class="d-flex align-items-center">
                <span id="userNameDisplay" class="me-3 fw-bold text-dark"></span>
                <button class="btn btn-outline-dark btn-sm" onclick="fetchAssets()"><i class="fas fa-sync-alt"></i>
                    รีเฟรช</button>
            </div>
        </div>

        <div class="card-custom">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>รหัสทรัพย์สิน</th>
                            <th>ชื่อรายการ</th>
                            <th>สถานะ</th>
                            <th class="text-center">การจัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="assetTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        window.onload = function () {
            const name = sessionStorage.getItem('displayName');
            if (!name) {
                window.location.href = 'borrow.html';
            } else {
                document.getElementById('userNameDisplay').innerText = `ผู้ใช้งาน: ${name}`;
                fetchAssets();
            }
        };

        async function fetchAssets() {
            try {
                const res = await fetch(`${API_URL}/assets`);
                const data = await res.json();
                const tbody = document.getElementById('assetTableBody');

                tbody.innerHTML = data.map(asset => `
                    <tr>
                        <td><span class="badge bg-dark px-3">${asset.asset_code}</span></td>
                        <td>${asset.name}</td>
                        <td><span class="status-badge ${getBadgeColor(asset.status)}">${asset.status.toUpperCase()}</span></td>
                        <td class="text-center">
                            ${asset.status === 'active'
                        ? '<span class="text-success"><i class="fas fa-check-circle"></i> พร้อมให้ยืม</span>'
                        : '<span class="text-muted"><i class="fas fa-minus-circle"></i> ไม่ว่าง</span>'}
                        </td>
                    </tr>
                `).join('');
            } catch (err) { console.error(err); }
        }

        function getBadgeColor(status) {
            const s = status.toLowerCase();
            if (s === 'active') return 'bg-success-subtle text-success';
            if (s === 'borrowing') return 'bg-info-subtle text-info';
            return 'bg-danger-subtle text-danger';
        }

        function confirmLogout() {
            if (confirm("ต้องการออกจากระบบ?")) {
                sessionStorage.clear();
                window.location.href = 'borrow.html';
            }
        }
    </script>
</body>

</html>
