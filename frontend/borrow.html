<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetFlow | เข้าสู่ระบบ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');

        :root {
            --dark-green: #0A3323;
            --moss-green: #839958;
            --beige: #F7F4D5;
            --midnight-green: #105666;
        }

        body {
            font-family: 'Kanit', sans-serif;
            margin: 0;
            background-color: var(--beige);
        }

        .main-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .image-side {
            flex: 1.2;
            background: url('bg.jpg') center/cover no-repeat;
            position: relative;
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(10, 51, 35, 0.85), rgba(16, 86, 102, 0.7));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--beige);
            padding: 40px;
        }

        .form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .form-content {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .logo-image {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 20px;
            border-radius: 50%;
        }

        h4 {
            color: var(--dark-green);
            font-weight: 500;
            margin-bottom: 25px;
        }

        .label-custom {
            color: var(--moss-green);
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: block;
            text-align: left;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: 1.5px solid #eee;
            margin-bottom: 15px;
        }

        .btn-primary {
            border-radius: 12px;
            padding: 15px;
            font-weight: 500;
            width: 100%;
            background-color: var(--dark-green);
            border: none;
            color: var(--beige);
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background-color: var(--midnight-green);
            transform: translateY(-2px);
        }

        .welcome-text h1 {
            font-size: 3.5rem;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>

    <div class="main-container">
        <div class="image-side">
            <div class="image-overlay">
                <div class="welcome-text text-center">
                    <h1>ASSET FLOW</h1>
                    <h3 class="mb-3" style="font-weight: 400;">ระบบจัดการทรัพย์สินและอุปกรณ์ไอที</h3>
                    <p style="font-weight: 300; opacity: 0.9; line-height: 1.8;">
                        บันทึกทรัพย์สินองค์กร • ติดตามสถานะเรียลไทม์<br>
                        จัดการการยืม-คืนอุปกรณ์ • ออกรายงานประจำปีแม่นยำ
                    </p>
                </div>
            </div>
        </div>

        <div class="form-side">
            <div class="form-content shadow">
                <div id="loginSection">
                    <img src="logo.jpg" alt="Logo" class="logo-image">
                    <h4>เข้าสู่ระบบเพื่อทำรายการยืม</h4>
                    <form id="loginForm">
                        <span class="label-custom">Username (Email)</span>
                        <input type="text" id="username" class="form-control" placeholder="example@email.com" required>
                        <span class="label-custom">Password</span>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <button type="submit" class="btn btn-primary">เข้าสู่ระบบ</button>
                        <div class="mt-3 text-center" style="font-size: 0.9rem;">
                            <span class="text-muted">ยังไม่มีบัญชี?</span>
                            <a href="register.html" style="color: var(--midnight-green); text-decoration: none; font-weight: 500;">สมัครสมาชิก</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        // ฟังก์ชันจัดการ Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                const result = await res.json();

                if (res.ok && result.success) {
                    // ✅ เก็บข้อมูลสำคัญลงใน SessionStorage
                    // 1. เก็บชื่อสำหรับแสดงผล
                    sessionStorage.setItem('displayName', result.user.display_name);
                    // 2. เก็บอีเมลสำหรับใช้ส่ง Nodemailer ในหน้า Dashboard (จุดสำคัญที่เคยเป็น null)
                    sessionStorage.setItem('userEmail', usernameInput); 

                    alert(`ยินดีต้อนรับคุณ ${result.user.display_name}`);

                    // 🚀 ไปที่หน้า Dashboard
                    window.location.href = 'dashboard.html';

                } else {
                    alert(result.message || 'อีเมลหรือรหัสผ่านไม่ถูกต้อง');
                }
            } catch (err) {
                console.error(err);
                alert('ไม่สามารถเชื่อมต่อ Server ได้ กรุณาตรวจสอบว่ารัน node index.js หรือยัง');
            }
        });
    </script>

</body>

</html>
